name: Publish Types

on:
  push:
    branches:
      - main
    paths:
      - 'melosys-skjema-api-types/**'
      - '.github/workflows/publish-types*.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and publish
        id: publish
        run: |
          VERSION="$(date +%Y.%m.%d)-$(git rev-parse --short=12 HEAD)"
          echo "Publishing melosys-skjema-api-types version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          ./gradlew :melosys-skjema-api-types:clean :melosys-skjema-api-types:publish -Pversion=$VERSION --no-build-cache
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release info to summary
        run: |
          echo "### Published version" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ steps.publish.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
