name: Gradle Test
on: pull_request
permissions:
  contents: read
  packages: read
  pull-requests: write
  checks: write
jobs:
  build:
    name: Build og test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5.3.0
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build og test
        run: ./gradlew build
        env:
          DB_USERNAME: melosys
          DB_PASSWORD: melosys
      - name: Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          check_name: 'Tester'
          report_paths: '**/build/test-results/test/TEST-*.xml'
