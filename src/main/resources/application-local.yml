# Override token exchange clients to use client_secret_basic locally
# (private_key_jwt fungerer ikke med mock-oauth2-server)
'no':
  nav:
    security:
      jwt:
        client:
          registration:
            repr-api:
              token-endpoint-url: http://host.docker.internal:8082/tokenx/token
              grant-type: urn:ietf:params:oauth:grant-type:token-exchange
              authentication:
                client-id: melosys-skjema-api
                client-secret: dummy
                client-auth-method: client_secret_basic
              token-exchange:
                audience: local:repr:repr-api
            arbeidsgiver-altinn-tilganger:
              token-endpoint-url: http://host.docker.internal:8082/tokenx/token
              grant-type: urn:ietf:params:oauth:grant-type:token-exchange
              authentication:
                client-id: melosys-skjema-api
                client-secret: dummy
                client-auth-method: client_secret_basic
              token-exchange:
                audience: local:fager:arbeidsgiver-altinn-tilganger